steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--platform=linux/amd64"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${BUILD_ID}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}"

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}-${_ENV}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${BUILD_ID}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--service-account=${_RUN_SA}"
      - "--set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=1,LOG_LEVEL=${_LOG_LEVEL},ENV=${_ENV},REASONING_ENGINE_APP_NAME=${_REASONING_ENGINE_APP_NAME},REASONING_ENGINE_ID=${_REASONING_ENGINE_ID},REASONING_ENGINE_LOCATION=${_REASONING_ENGINE_LOCATION},VERTEX_RAG_LOCATION=${_VERTEX_RAG_LOCATION},VERTEX_RAG_CORPUS=${_VERTEX_RAG_CORPUS},DISCOVERY_ENGINE_ENGINE_ID=${_DISCOVERY_ENGINE_ENGINE_ID},DISCOVERY_ENGINE_LOCATION=${_DISCOVERY_ENGINE_LOCATION}"
      - "--min-instances=${_MIN_INSTANCES}"
      - "--max-instances=${_MAX_INSTANCES}"
      - "--memory=${_MEMORY}"
      - "--cpu=${_CPU}"
      - "--timeout=${_TIMEOUT}"
      - "--concurrency=${_CONCURRENCY}"

  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        SERVICE_URL=$(gcloud run services describe ${_SERVICE}-${_ENV} --region=${_REGION} --format='value(status.url)')
        READY=$(gcloud run services describe ${_SERVICE}-${_ENV} --region=${_REGION} --format='json(status.conditions)' | python3 -c 'import sys, json; data=json.load(sys.stdin); conds=data.get("status", {}).get("conditions", []); print(next((c.get("status","") for c in conds if c.get("type")=="Ready"), ""))')
        test "$${READY}" = "True" || exit 1
        python3 -c "import sys, urllib.request; base='$${SERVICE_URL}'.rstrip('/'); checks=['/healthz','/']; [urllib.request.urlopen(base + p, timeout=15) for p in checks]"
        echo "Service URL: $${SERVICE_URL}"
        echo "Smoke test passed (/healthz, /)"

substitutions:
  _REGION: "asia-northeast3"
  _REPO: "adk-rag-repo"
  _SERVICE: "adk-rag-api"
  _ENV: "dev"
  _RUN_SA: "cloudrun-sa@didimtest006.iam.gserviceaccount.com"
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "10"
  _MEMORY: "2Gi"
  _CPU: "2"
  _TIMEOUT: "60s"
  _CONCURRENCY: "20"
  _LOG_LEVEL: "INFO"
  _REASONING_ENGINE_APP_NAME: ""
  _REASONING_ENGINE_ID: ""
  _REASONING_ENGINE_LOCATION: "us-central1"
  _VERTEX_RAG_LOCATION: "asia-northeast3"
  _VERTEX_RAG_CORPUS: ""
  _DISCOVERY_ENGINE_ENGINE_ID: ""
  _DISCOVERY_ENGINE_LOCATION: "global"

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}"
